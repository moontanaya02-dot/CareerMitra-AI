<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Career Roadmap | CareerMitra</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="career-page">

    <div class="career-header">
        <div class="header-overlay">
            <h1><i class="fas fa-map-signs"></i> Pro Career Roadmap</h1>
            <p>AI-driven steps to transform your professional journey</p>
        </div>
    </div>

    <div class="progress-container">
        <div class="progress-bar-wrapper">
            <div id="progressFill" class="progress-fill"></div>
        </div>
        <p id="progressLabel">0% Journey Completed</p>
    </div>

    <div class="career-container">
        <div class="step-card" id="step1" onclick="completeStep(1)">
            <div class="step-num">1</div>
            <i class="fas fa-lightbulb icon"></i>
            <h2>Discovery</h2>
            <p>Choose Your Interest</p>
        </div>

        <div class="step-card" id="step2" onclick="completeStep(2)">
            <div class="step-num">2</div>
            <i class="fas fa-code icon"></i>
            <h2>Upskilling</h2>
            <p>Master Core Skills</p>
        </div>

        <div class="step-card" id="step3" onclick="completeStep(3)">
            <div class="step-num">3</div>
            <i class="fas fa-project-diagram icon"></i>
            <h2>Validation</h2>
            <p>Build Real Projects</p>
        </div>

        <div class="step-card" id="step4" onclick="completeStep(4)">
            <div class="step-num">4</div>
            <i class="fas fa-rocket icon"></i>
            <h2>Launch</h2>
            <p>Get Hired</p>
        </div>
    </div>

    <div id="dynamicContent" class="dynamic-content-box">
        <div class="placeholder-msg">Click on a step to see details...</div>
    </div>

    <div class="career-cta">
        <button class="ai-btn" onclick="startAI()">
            <i class="fas fa-robot"></i> Explore with AI Guidance
        </button>
    </div>

    <script>
        let userData = JSON.parse(localStorage.getItem("careerData")) || { step: 0, interest: "" };

        function completeStep(step) {
            if (step > userData.step + 1) {
                showNotification("⚠️ Please complete previous steps first!", "orange");
                return;
            }

            userData.step = step;
            localStorage.setItem("careerData", JSON.stringify(userData));
            updateUI();

            // Dynamic Rendering
            const content = document.getElementById("dynamicContent");
            content.classList.add("fade-in");

            if (step === 1) renderInterests();
            if (step === 2) renderSkills();
            if (step === 3) renderProjects();
            if (step === 4) renderJobs();
        }

        function renderInterests() {
            document.getElementById("dynamicContent").innerHTML = `
                <h3><i class="fas fa-star"></i> Select Your Dream Field</h3>
                <div class="interest-grid">
                    <div class="int-item" onclick="selectInterest('IT')">💻 IT & Software</div>
                    <div class="int-item" onclick="selectInterest('Medical')">🩺 Healthcare</div>
                    <div class="int-item" onclick="selectInterest('Business')">📈 Business & Finance</div>
                </div>
            `;
        }

        function selectInterest(type) {
            userData.interest = type;
            localStorage.setItem("careerData", JSON.stringify(userData));
            showNotification(`✅ Great Choice! Field set to ${type}`, "green");
            completeStep(2); // Auto move to skills
        }

        function renderSkills() {
            if (!userData.interest) { renderInterests(); return; }
            
            const skillsMap = {
                IT: ["Frontend (React)", "Backend (Node.js)", "AI/ML Basics", "Cloud Computing"],
                Medical: ["Anatomy", "Emergency Response", "Pharmacology", "Patient Care"],
                Business: ["Digital Marketing", "Financial Analysis", "SEO", "Sales Psychology"]
            };

            document.getElementById("dynamicContent").innerHTML = `
                <h3>🚀 Top Skills for ${userData.interest}</h3>
                <div class="skill-tags">
                    ${skillsMap[userData.interest].map(s => `<span class="tag">${s}</span>`).join('')}
                </div>
                <p class="mt-2 text-muted">Master these to become an expert in your field.</p>
            `;
        }

        function renderProjects() {
            document.getElementById("dynamicContent").innerHTML = `
                <h3>🛠️ Recommended Projects</h3>
                <ul class="project-list">
                    <li><i class="fas fa-check-circle"></i> <b>Portfolio:</b> Showcase your best work.</li>
                    <li><i class="fas fa-check-circle"></i> <b>Case Study:</b> Solve a real-world problem.</li>
                    <li><i class="fas fa-check-circle"></i> <b>Live Demo:</b> Deploy your app/process.</li>
                </ul>
            `;
        }

        function renderJobs() {
            document.getElementById("dynamicContent").innerHTML = `
                <div class="congrats-card">
                    <h2>🎉 Congratulations!</h2>
                    <p>Your profile is 100% complete. AI suggests applying on:</p>
                    <div class="job-links">
                        <a href="https://linkedin.com" target="_blank">LinkedIn</a>
                        <a href="https://internshala.com" target="_blank">Internshala</a>
                    </div>
                </div>
            `;
        }

        function updateUI() {
            document.querySelectorAll(".step-card").forEach((card, idx) => {
                card.classList.remove("active", "completed");
                if (idx + 1 < userData.step) card.classList.add("completed");
                if (idx + 1 === userData.step) card.classList.add("active");
            });

            let progress = (userData.step / 4) * 100;
            document.getElementById("progressFill").style.width = progress + "%";
            document.getElementById("progressLabel").innerText = `${progress}% Journey Completed`;
        }

        function showNotification(msg, color) {
            // Simple alert for now, can be customized
            alert(msg);
        }

        function startAI() {
            window.location.href = "ai.html";
        }

        window.onload = updateUI;
    </script>

    <style>
        /* Pro Layout Add-ons */
        .career-page { background: #f0f4f8; }
        .interest-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-top: 20px; }
        .int-item { background: white; padding: 20px; border-radius: 12px; cursor: pointer; border: 2px solid transparent; transition: 0.3s; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .int-item:hover { border-color: #6366f1; transform: scale(1.05); }
        .dynamic-content-box { max-width: 800px; margin: 30px auto; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; }
        .tag { display: inline-block; background: #e0e7ff; color: #4338ca; padding: 8px 15px; border-radius: 20px; margin: 5px; font-weight: 600; }
        .step-card.completed { background: #dcfce7; border-color: #22c55e; }
        .step-card.active { transform: scale(1.1); border: 2px solid #6366f1; box-shadow: 0 15px 30px rgba(99, 102, 241, 0.2); }
    </style>
</body>
</html>
